// For future Amap / Baidu data: apply gcj02ToWgs84 once before adding.
function gcj02ToWgs84(lon, lat) {
  const a = 6378240.0, ee = 0.00669342162296594323;
  function transformLat(x, y) {
    let r = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*x + 0.2*x*y;
    r += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    r += (20*Math.sin(y*Math.PI) + 40*Math.sin(y/3*Math.PI)) * 2/3;
    r += (160*Math.sin(y/12*Math.PI) + 320*Math.sin(y*Math.PI/30)) * 2/3;
    return r;
  }
  function transformLon(x, y) {
    let r = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    r += (20*Math.sin(x*Math.PI) + 40*Math.sin(x/3*Math.PI)) * 2/3;
    r += (150*Math.sin(x/12*Math.PI) + 300*Math.sin(x/30*Math.PI)) * 2/3;
    return r;
  }
  let wgsLon = lon, wgsLat = lat;
  for (let i = 0; i < 5; i++) {
    const radLat = wgsLat / 180 * Math.PI;
    let magic = Math.sin(radLat);
    magic = 1 - ee * magic * magic;
    const sqrtMagic = Math.sqrt(magic);
    let dLat = transformLat(wgsLon - 105, wgsLat - 35);
    let dLon = transformLon(wgsLon - 105, wgsLat - 35);
    dLat = (dLat * 180) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
    dLon = (dLon * 180) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
    const gcjLat = wgsLat + dLat;
    const gcjLon = wgsLon + dLon;
    wgsLon += lon - gcjLon;
    wgsLat += lat - gcjLat;
    if (Math.abs(lon - gcjLon) < 1e-7 && Math.abs(lat - gcjLat) < 1e-7) break;
  }
  return { lon: wgsLon, lat: wgsLat };
}

}

}

const map = L.map('map', { zoomControl: true, scrollWheelZoom: true, worldCopyJump: true });

// English map: use CartoDB Voyager which renders Pinyin/English labels globally,
// so Chinese cities show as 'CHANGNING DISTRICT', 'Pudong', 'Wuhu', etc.
// (OSM default renders local-language labels → Chinese characters in China.)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
  maxZoom: 18,
  subdomains: 'abcd',
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

// Fit bounds to all main markers
const fitPoints = ORDER.map(c => [CITIES[c].lat, CITIES[c].lon]);
fitPoints.push([CITIES.BCN.lat, CITIES.BCN.lon]);
map.fitBounds(fitPoints, { padding: [80, 80] });

// === LONG-HAUL FLIGHT ARCS (drawn first so they sit behind markers) ===
function drawLongArc(points, color, leg, opacity = 0.45) {
  const latlngs = points.map(p => [p[0], p[1]]);
  return L.polyline(latlngs, {
    color: color, weight: 4, opacity: opacity,
    dashArray: '9, 12', lineCap: 'round'
  }).addTo(map).bindPopup(
    `<div class="popup-content">
      <div class="city">${dateToEn(leg.date)} · Long-haul</div>
      <div class="meta" style="font-weight:600;font-size:13px;color:#1a202c">${CITIES[leg.from].name} →  ${CITIES[leg.to].name}</div>
      <div><span class="flight-no">${leg.no}</span> <span class="tag" style="background:${color}">${TRANSPORT_LABEL[leg.transport]}</span></div>
      <div class="time-row">
        <div><div class="lbl">DEP</div>${leg.dep}</div>
        <div><div class="lbl">arrives</div>${leg.arr}</div>
      </div>
      <div class="meta">Duration ${leg.dur}${leg.note ? ' · ' + (leg.note === 'Outbound' ? 'Outbound' : leg.note === 'Return' ? 'Return' : leg.note) : ''}</div>
    </div>`
  );
}

drawLongArc(ARC_BCN_SZX, COLORS.flight, LEGS[0], 0.5);
drawLongArc(ARC_PEK_BCN, COLORS.flight, LEGS[10], 0.5);

// Format leg popup date
function dateToEn(dateStr) {
  const d = new Date(dateStr + ' 2026');
  if (isNaN(d.getTime())) return dateStr;
  const m = d.toLocaleString("en-US", {month:"short"});
  return `${m} ${d.getDate()}`;
}

// Attractions → HTML chip list
function attractionsHtml(code) {
  const list = ATTRACTIONS[code];
  if (!list || !list.length) return '';
  return `<div class="attractions">
      <div class="attractions-title">Sights</div>
      <ul>${list.map(a => `<li>${a}</li>`).join('')}</ul>
    </div>`;
}

// === IN-CHINA ROUTE POLYLINES ===
// Using transport node coords (from_loc / to_loc), HSR legs use waypoints
for (let i = 0; i < ORDER.length - 1; i++) {
  const fromCode = ORDER[i];
  const toCode = ORDER[i + 1];
  const leg = LEGS[i + 1];  // skip legs[0] (BCN→SZX long-haul)
  const color = COLORS[leg.transport];
  const dash = leg.transport === 'ferry' ? '5,8' : (leg.transport === 'train' ? '8,5' : null);

  const fromCoords = getLocCoords(leg, 'from');
  const toCoords = getLocCoords(leg, 'to');

  // HSR legs: use actual route waypoints
  const hsrKey = `${fromCode}→${toCode}`;
  let polylinePoints;
  if (leg.transport === 'train' && HSR_ROUTES[hsrKey]) {
    polylinePoints = HSR_ROUTES[hsrKey];
  } else {
    polylinePoints = [fromCoords, toCoords];
  }

  const fromName = getLocName(leg, 'from');
  const toName = getLocName(leg, 'to');

  L.polyline(
    polylinePoints,
    { color: color, weight: 4.5, opacity: 0.9, dashArray: dash }
  ).addTo(map).bindPopup(
    `<div class="popup-content">
      <div class="city">${dateToEn(leg.date)}</div>
      <div class="meta" style="font-weight:600;font-size:13px;color:#1a202c">${CITIES[fromCode].name} → ${CITIES[toCode].name}</div>
      <div class="meta" style="font-size:10px;color:#718096">${fromName} → ${toName}</div>
      ${leg.no !== '—' ? `<div><span class="flight-no">${leg.no}</span> <span class="tag" style="background:${color}">${TRANSPORT_LABEL[leg.transport]}</span></div>` : `<div><span class="tag" style="background:${color}">${TRANSPORT_LABEL[leg.transport]}</span></div>`}
      <div class="time-row">
        <div><div class="lbl">DEP</div>${leg.dep}</div>
        <div><div class="lbl">arrives</div>${leg.arr}</div>
      </div>
      <div class="meta">Duration ${leg.dur}${leg.note ? ' · ' + (leg.note === 'Outbound' ? 'Outbound' : leg.note === 'Return' ? 'Return' : leg.note === 'Same day' ? 'Same day' : leg.note) : ''}</div>
    </div>`
  );
}

// Airport connector arcs replaced by generic city↔node loop below.
// ARC_SHA_PVG and ARC_CTU_TFU still declared (const) above — unused.

// === CITY MARKERS ===
ORDER.forEach((code, idx) => {
  const city = CITIES[code];
  const legIn = LEGS[idx];
  const legOut = LEGS[idx + 1];
  const ringColor = (legIn && legOut && legIn.transport === legOut.transport)
    ? COLORS[legIn.transport]
    : (legIn ? COLORS[legIn.transport] : COLORS[legOut.transport]);

  const icon = L.divIcon({
    html: `<div class="custom-marker" style="border-color:${ringColor}">${idx + 1}</div>`,
    iconSize: [30, 30], iconAnchor: [15, 15], className: ''
  });

  // Stay: incoming=LEGS[idx], outgoing=LEGS[idx+1]
  // Parse (+Nd) for timezone-crossing arrivals (e.g. BCN→SZX)
  const arriveLeg = LEGS[idx];
  const departLeg = LEGS[idx + 1];
  let arriveDateObj = arriveLeg?.date ? new Date(arriveLeg.date + ' 2026') : null;
  const arrMatch = (arriveLeg?.arr || '').match(/\(\+(\d+)d\)/);
  if (arrMatch && arriveDateObj) {
    arriveDateObj.setDate(arriveDateObj.getDate() + parseInt(arrMatch[1]));
  }
  const departDateObj = departLeg?.date ? new Date(departLeg.date + ' 2026') : null;

  let stayText = '';
  let arriveLabel = '';
  if (arriveDateObj) {
    const m = arriveDateObj.toLocaleString('en-US', {month:'short'});
    arriveLabel = `${m} ${arriveDateObj.getDate()}`;
  }
  if (arriveDateObj && departDateObj) {
    const days = Math.round((departDateObj - arriveDateObj) / 86400000);
    stayText = `<div class="meta"><b>Stay: </b>${days}  days</div>`;
  }

  L.marker([city.lat, city.lon], { icon: icon, title: city.name }).addTo(map)
    .bindPopup(
      `<div class="popup-content">
        <div class="city">${city.name} · Stop ${idx + 1}</div>
        ${stayText}
        ${city.hotel ? `<div class="meta"><b>Hotel: </b>${city.hotel}</div>` : ''}
        <div class="meta"><b>Arrive: </b>${arriveLabel || '—'}${arriveLeg?.arr && arriveLeg.arr !== 'TBD' ? ' · ' + arriveLeg.arr : ''}</div>
        ${legOut && idx < ORDER.length - 1 ? `<div class="meta"><b>Depart: </b>${legOut.date} →  ${CITIES[ORDER[idx + 1]].name}${legOut.dep !== 'TBD' ? ' · ' + legOut.dep : ''}</div>` : ''}
        ${attractionsHtml(code)}
      </div>`
    );
});

// === BARCELONA MARKER ===
const bcnIcon = L.divIcon({
  html: `<div class="custom-marker marker-bcn">✈</div>`,
  iconSize: [30, 30], iconAnchor: [15, 15], className: ''
});
L.marker([CITIES.BCN.lat, CITIES.BCN.lon], { icon: bcnIcon }).addTo(map)
  .bindPopup(`<div class="popup-content">
    <div class="city">Barcelona · BCN</div>
    <div class="meta"><b>Outbound:</b> Sep 23 · ZH866 · 12:20 CEST</div>
    <div class="meta"><b>Return:</b> Oct 17 · CA845 · arrives 08:15 CEST</div>
  </div>`);

// === TRANSPORT NODE MARKERS (airport + station) ===
const transportNodeKeys = Object.keys(TRANSPORT_NODES);
const NODE_COLOR = {airport: '#2b6cb0', station: '#2f855a', port: '#d69e2e'};
const NODE_ICON = {airport: '✈', station: '🚄', port: '⛴'};
transportNodeKeys.forEach(code => {
  const node = TRANSPORT_NODES[code];
  const icon = L.divIcon({
    html: `<div class="airport-marker" style="border-color:${NODE_COLOR[node.type] || '#718096'}"></div>`,
    iconSize: [12, 12], iconAnchor: [6, 6], className: ''
  });
  L.marker([node.lat, node.lon], { icon: icon, title: node.name })
    .bindTooltip(node.name + ' ' + (NODE_ICON[node.type] || ''), {
      direction: 'right', offset: [8, 0], opacity: 0.95
    })
    .addTo(map);
});

// Hotel markers: lodging points (purple bed icon), only for cities in HOTELS
// No connecting lines (avoid visual clutter); spatial proximity + legend differentiate.
Object.entries(HOTELS).forEach(([code, hotel]) => {
  const icon = L.divIcon({
    html: '<div class="hotel-marker">🛏</div>',
    iconSize: [20, 20], iconAnchor: [10, 10], className: ''
  });
  L.marker([hotel.lat, hotel.lon], { icon: icon, title: hotel.name })
    .bindPopup(
      `
        <div class="popup-content">
          <div class="city">${hotel.name} · ${hotel.branch}</div>
          <div class="meta"><b>Address:</b> ${hotel.address}</div>
          <div class="meta"><b>Check-in:</b> ${hotel.checkin} · <b>Check-out:</b> ${hotel.checkout}</div>
        </div>
      `
    )
    .bindTooltip(hotel.name + ' · ' + hotel.branch, {
      direction: 'right', offset: [10, 0], opacity: 0.95
    })
    .addTo(map);
});

// Attraction markers (orange icon, with date)
Object.entries(ATTRACTION_POINTS).forEach(([key, poi]) => {
  const icon = L.divIcon({
    html: '<div class="attraction-marker">' + poi.emoji + '</div>',
    iconSize: [18, 18], iconAnchor: [9, 9], className: ''
  });
  L.marker([poi.lat, poi.lon], { icon: icon, title: poi.name })
    .bindPopup(
      `
        <div class="popup-content">
          <div class="city">${poi.name}</div>
          <div class="meta">${poi.address}</div>
          <div class="meta"><b>Date:</b> ${poi.date}</div>
        </div>
      `
    )
    .bindTooltip(poi.name + ' · ' + poi.date, {
      direction: 'right', offset: [10, 0], opacity: 0.95
    })
    .addTo(map);
});



// Grey dashed connector lines: city center ↔ all linked transport nodes
// Each city has 1–2 connector lines (airport, ferry port, HSR station)
const cityToNodes = [
  ["SZX", "SZX_AIR"],
  ["SZX", "SZX_PORT"],
  ["MFM", "MFM_PORT"],
  ["HKG", "HKG_PORT"],
  ["HKG", "HKG_AIR"],
  ["SHA", "SHA_HQ"],
  ["SHA", "PVG"],
  ["WHU", "WHU_XY"],
  ["WHU", "WHU_STATION"],
  ["CTU", "CTU_EAST"],
  ["CTU", "TFU"],
  ["CKG", "CKG_EAST"],
  ["CKG", "CKG_NORTH"],
  ["DYG", "DYG_WEST"],
  ["DYG", "DYG_AIR"],
  ["XIY", "XIY_NORTH"],
  ["XIY", "XIY_AIR"],
  ["PEK", "PEK_WEST"],
  ["PEK", "PEK_AIR"],
];
cityToNodes.forEach(([cityCode, nodeCode]) => {
  const city = CITIES[cityCode];
  const node = TRANSPORT_NODES[nodeCode];
  if (!city || !node) return;
  L.polyline(
    [[city.lat, city.lon], [node.lat, node.lon]],
    { color: '#718096', weight: 1.5, opacity: 0.4, dashArray: '2,4' }
  ).addTo(map);
});

// === SIDEBAR LEG CARDS ===
const legList = document.getElementById('leg-list');
LEGS.forEach((leg, i) => {
  const card = document.createElement('div');
  card.className = 'leg-card' + (i === 0 || i === 11 ? ' long-haul' : '');
  card.style.borderLeftColor = COLORS[leg.transport];
  const flightTag = leg.no !== '—' ? `<span style="background:${COLORS[leg.transport]}; color:#fff; padding:1px 5px; border-radius:3px; font-size:9px; font-weight:700; margin-left:4px; font-family:monospace;">${leg.no}</span>` : '';
  const fromName = getLocName(leg, 'from');
  const toName = getLocName(leg, 'to');
  const detailName = (fromName !== CITIES[leg.from].name || toName !== CITIES[leg.to].name)
    ? `<div class="note">${fromName} → ${toName}</div>` : '';
  card.innerHTML = `
    <div class="date" style="color:${COLORS[leg.transport]}">${dateToEn(leg.date)}${flightTag}</div>
    <div class="route">${CITIES[leg.from].name} → ${CITIES[leg.to].name}</div>
    ${detailName}
    <div class="meta">${leg.dep} → ${leg.arr} · ${leg.dur}</div>
    ${leg.note ? `<div class="note">${leg.note}</div>` : ''}
    <div class="zoom-hint">Click to zoom on map ↗</div>
  `;
  card.dataset.idx = i;
  card.addEventListener('click', () => {
    const fromCoords = getLocCoords(leg, 'from');
    const toCoords = getLocCoords(leg, 'to');
    if (!fromCoords || !toCoords) return;

    // Highlight active card
    document.querySelectorAll('.leg-card.active').forEach(el => el.classList.remove('active'));
    card.classList.add('active');

    // Long-haul: >60° span → fitBounds covers both ends
    const lonSpan = Math.abs(toCoords[1] - fromCoords[1]);
    if (lonSpan > 60) {
      map.fitBounds(
        [fromCoords, toCoords],
        {
          paddingTopLeft: [LEFT_PADDING, 80],
          paddingBottomRight: [80, 80],
          maxZoom: 6, animate: true
        }
      );
    } else {
      map.fitBounds(
        [fromCoords, toCoords],
        {
          paddingTopLeft: [LEFT_PADDING, 80],
          paddingBottomRight: [80, 80],
          maxZoom: 9, animate: true
        }
      );
    }

    // Scroll sidebar to keep card visible
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  legList.appendChild(card);
});
</script>
